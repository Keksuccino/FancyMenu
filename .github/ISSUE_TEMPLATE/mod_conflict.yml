name: Mod Conflict
description: Report a conflict with another mod.
labels: ["mod conflict"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a mod conflict. Please fill out the information below as completely as possible.

  - type: input
    id: conflicting-mod-name
    attributes:
      label: Conflicting Mod Name
      description: What is the name of the mod that conflicts with FancyMenu?
      placeholder: "Example: Example Mod"
    validations:
      required: true

  - type: textarea
    id: mod-conflict-description
    attributes:
      label: Detailed Mod Conflict Description
      description: Please describe what happens when using FancyMenu together with the conflicting mod.
      placeholder: |
        Describe the mod conflict in detail here.
        What happens when both mods are installed?
        What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: How To Reproduce The Mod Conflict
      description: Please explain step by step how this mod conflict can be reproduced.
      placeholder: |
        1. Install FancyMenu ...
        2. Install the conflicting mod ...
        3. Start Minecraft with ...
        4. Open ...
        5. See the issue ...
    validations:
      required: true

  - type: checkboxes
    id: installed-mods
    attributes:
      label: Installed Mods
      description: Please select all that apply.
      options:
        - label: Essential mod installed?
        - label: Optifine installed?
        - label: Sinytra Connector mod installed?

  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft Version
      description: Which Minecraft version are you using?
      placeholder: "Example: 1.20.1"
    validations:
      required: true

  - type: input
    id: fancymenu-version
    attributes:
      label: FancyMenu Version
      description: Which FancyMenu version are you using?
      placeholder: "Example: 3.8.0"
    validations:
      required: true

  - type: dropdown
    id: mod-loader
    attributes:
      label: Mod Loader
      description: Which mod loader are you using?
      options:
        - Fabric
        - Forge
        - NeoForge
        - Quilt
    validations:
      required: true

  - type: input
    id: mod-loader-version
    attributes:
      label: Mod Loader Version
      description: Which version of the selected mod loader are you using?
      placeholder: "Example: 0.15.11, 47.2.0, 21.1.0"
    validations:
      required: true

  - type: input
    id: fabric-api-version
    attributes:
      label: Fabric API Version
      description: Optional. Only fill this in if you are using Fabric.
      placeholder: "Example: 0.92.2+1.20.1"
    validations:
      required: false

  - type: upload
    id: latest-log
    attributes:
      label: Latest Log File
      description: |
        Optional. Please upload your `/logs/latest.log` file.

        The log should be grabbed and uploaded immediately after experiencing the mod conflict, for example right after seeing something not work as intended.

        If the log file is too large to upload here, please upload it to https://gist.github.com instead and add the link to the detailed mod conflict description above.
    validations:
      required: false
      accept: ".log,.txt"
